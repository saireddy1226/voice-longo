<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password - Voice-Lingo</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e2972, #2a3c98);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(255, 255, 255);
        }

        .container {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: black;
        }

        h2 {
            color: #2a5298;
            margin-bottom: 20px;
        }

        .requirements {
            text-align: left;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            line-height: 1.6;
        }

        .requirements strong {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
            background-color: #f9f9f9;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }

        .btn-primary:hover {
            background: #1e3c72;
        }

        .btn-secondary {
            width: 100%;
            padding: 10px;
            background: #e0e0e0;
            border: none;
            border-radius: 6px;
            color: #333;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #2a5298;
            margin: 15px 0;
        }

        .loading.active {
            display: block;
        }

        .success-box {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            color: #155724;
        }

        .success-box h3 {
            margin-bottom: 10px;
        }

        .user-id {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            word-break: break-all;
            font-weight: bold;
            color: #2a5298;
            cursor: pointer;
        }

        .user-id:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Password</h2>
        <div id="messageDiv" class="message"></div>
        <div id="loadingDiv" class="loading">Processing...</div>

        <div id="formSection">
            <div class="requirements">
                <strong>Password must:</strong><br>
                ✓ Minimum 8 characters<br>
                ✓ At least 1 special character (!@#$%^&*)<br>
                ✓ Include at least 1 digit
            </div>

            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Enter password">
            </div>

            <div class="form-group">
                <label for="regConfirmPassword">Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm password">
            </div>

            <button class="btn-primary" onclick="registerUser()">Register</button>
            <button class="btn-secondary" onclick="goBack()">Back</button>
        </div>

        <div id="successBox" class="success-box">
            <h3>Registration Successful!</h3>
            <p>Your User ID:</p>
            <div class="user-id" id="userIdDisplay" onclick="copyUserID()">Click to copy</div>
            <p style="font-size: 12px; margin-top: 10px;">Redirecting to dashboard in 3 seconds...</p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if data exists from previous page
        window.addEventListener('load', () => {
            const userId = sessionStorage.getItem('regUserId'); 
            const name = sessionStorage.getItem('regName');
            const email = sessionStorage.getItem('regEmail');
            const language = sessionStorage.getItem('regLanguage');

            if (!userId || !name || !email || !language) {
                showMessage('Session expired. Please register again.', 'error');
                setTimeout(() => {
                    window.location.href = 'register.html';
                }, 2000);
            }
        });

       async function registerUser(){

    const password=document.getElementById('regPassword').value;
const confirmPassword=document.getElementById('regConfirmPassword').value;

const userId=sessionStorage.getItem('regUserId');
const name=sessionStorage.getItem('regName');
const email=sessionStorage.getItem('regEmail');
const language=sessionStorage.getItem('regLanguage');

const pattern=/^(?=.*[0-9])(?=.*[!@#$%^&*]).{8,}$/;

if(!pattern.test(password)){
showMessage('Password does not meet requirements','error');
return;
}

if(password!==confirmPassword){
showMessage('Passwords do not match','error');
return;
}

showLoading(true);

try{

const response = await fetch(`${CONFIG.SERVER_URL}/register`, {
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
user_id:userId,
name:name,
email:email,
password:password,
language:language
})
});

const data=await response.json();

showLoading(false);

if(response.ok){

localStorage.setItem('currentUser',JSON.stringify(data));

sessionStorage.clear();

document.getElementById('formSection').style.display='none';
document.getElementById('successBox').style.display='block';
document.getElementById('userIdDisplay').textContent=data.user_id;

setTimeout(()=>{
window.location.href='dashboard.html';
},3000);

}else{

const errorMsg=data.detail||data.error||"Registration failed";
showMessage(errorMsg,'error');

}

}catch(error){

showLoading(false);
showMessage('Error: '+error.message,'error');

}

}
        function goBack() {
            window.location.href = 'register.html';
        }

        function copyUserID() {
            const userId = document.getElementById('userIdDisplay').textContent;
            navigator.clipboard.writeText(userId).then(() => {
                const box = document.getElementById('userIdDisplay');
                const originalText = box.textContent;
                box.textContent = 'Copied!';
                setTimeout(() => {
                    box.textContent = originalText;
                }, 2000);
            });
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('messageDiv');
            msgDiv.textContent = msg;
            msgDiv.className = 'message ' + type;
        }

        function showLoading(show) {
            document.getElementById('loadingDiv').style.display = show ? 'block' : 'none';
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                registerUser();
            }
        });
    </script>
</body>
</html>
