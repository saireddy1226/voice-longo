<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="css/chatroom.css">
</head>

<body class="chat-body">

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <button class="back-btn" onclick="location.href='chat.html'">⬅</button>
        <div class="chat-user">
            <div class="chat-avatar" id="chatAvatar">U</div>
            <span id="chatUserName">User</span>
        </div>
        <button class="chat-call-btn" onclick="callUser()">📞</button>
    </div>

    <!-- MESSAGE AREA -->
    <div class="chat-messages" id="chatMessages">
        <!-- Messages dynamically loaded -->
    </div>

    <!-- INPUT AREA -->
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type a message" onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
    let currentChatUser = null;

    window.addEventListener('load', () => {
        // Get chat user from sessionStorage
        currentChatUser = sessionStorage.getItem('chatUserId');
        
        if (!currentChatUser) {
            window.location.href = 'chat.html';
            return;
        }

        document.getElementById('chatUserName').textContent = currentChatUser;
        document.getElementById('chatAvatar').textContent = currentChatUser.charAt(0).toUpperCase();

        loadMessages();
    });

    function loadMessages() {
        const container = document.getElementById('chatMessages');
        let allMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
        
        // Filter messages for this user
        const userMessages = allMessages.filter(m => m.with === currentChatUser);

        container.innerHTML = '';
        
        if (userMessages.length === 0) {
            container.innerHTML = '<p style="text-align: center; padding: 20px; color: #999;">No messages yet. Start the conversation!</p>';
        }

        userMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.type}`;
            msgDiv.innerHTML = `
                ${msg.text}
                <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            `;
            container.appendChild(msgDiv);
        });

        // Scroll to bottom
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (!text) return;

        // Save message
        let allMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
        allMessages.push({
            with: currentChatUser,
            type: 'sent',
            text: text,
            timestamp: new Date().toISOString()
        });
        localStorage.setItem('chatMessages', JSON.stringify(allMessages));

        // Clear input and reload
        input.value = '';
        loadMessages();

        // Simulate reply
        setTimeout(() => {
            allMessages = JSON.parse(localStorage.getItem('chatMessages')) || [];
            allMessages.push({
                with: currentChatUser,
                type: 'received',
                text: 'Thanks for the message!',
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('chatMessages', JSON.stringify(allMessages));
            loadMessages();
        }, 1000);
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    function callUser() {
        sessionStorage.setItem('receiverId', currentChatUser);
        window.location.href = 'call.html';
    }
</script>

</body>
</html>
